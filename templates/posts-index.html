<style>
:root {
  --paper:     #F5F0E8;
  --paper2:    #EDE8DF;
  --card:      #FFFFFF;
  --g0:        #16B05A;
  --g1:        #20C96A;
  --g2:        #0C7A3D;
  --g-light:   #B2F0CE;
  --g-pale:    #DCF5EB;
  --coral:     #FF3D5A;
  --sun:       #FFA800;
  --sky:       #0088BB;
  --lav:       #7C3AED;
  --peach:     #FF6A30;
  --ink:       #1A1208;
  --ink2:      #3D3020;
  --ink3:      #6B5C44;
  --border:    rgba(26,18,8,.10);
  --shadow:    rgba(26,18,8,.07);
  --shadow-m:  rgba(26,18,8,.13);
  --shadow-lg: rgba(26,18,8,.18);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Nunito',sans-serif;
  background:var(--paper);
  color:var(--ink);
  overflow-x:hidden;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:700;height:68px;
  padding:0 52px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(245,240,232,.90);
  backdrop-filter:blur(24px) saturate(1.8);
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 20px var(--shadow);
}
.logo{
  font-family:'Kaushan Script',cursive;font-weight:400;font-size:1.8rem;
  letter-spacing:-.02em;text-decoration:none;
  color:var(--ink);
}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.7)}}

.nav-links{display:flex;gap:8px;align-items:center}
.npill{
  padding:8px 20px;border-radius:50px;
  border:1.5px solid var(--border);
  background:transparent;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;
  color:var(--ink2);text-decoration:none;
  transition:all .22s;
}
.npill:hover{border-color:var(--g0);color:var(--g0);background:var(--g-pale)}
.npill.solid{
  background:var(--g0);border-color:var(--g0);color:white;
  box-shadow:0 4px 16px rgba(24,184,96,.3);
}
.npill.solid:hover{background:var(--g2);border-color:var(--g2);box-shadow:0 6px 24px rgba(14,143,70,.35)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:15px 34px;border-radius:50px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.94rem;
  border:2px solid transparent;
  transition:all .25s;position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.35) 50%,transparent 62%);
  transform:translateX(-120%);transition:transform .55s;
}
.btn:hover::after{transform:translateX(120%)}
.btn-g{
  background:linear-gradient(135deg,var(--g1),var(--g0));
  color:white;border-color:var(--g0);
  box-shadow:0 6px 24px rgba(24,184,96,.3),0 2px 8px rgba(24,184,96,.2);
}
.btn-g:hover{box-shadow:0 10px 36px rgba(24,184,96,.4),0 4px 16px rgba(24,184,96,.25);transform:translateY(-3px)}
.btn-outline{
  border-color:var(--border);color:var(--ink);background:var(--card);
  box-shadow:0 2px 12px var(--shadow);
}
.btn-outline:hover{border-color:var(--g0);color:var(--g0);box-shadow:0 6px 20px var(--shadow-m);transform:translateY(-3px)}

/* ── TAGS ── */
.tag{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 16px;border-radius:50px;
  font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;
  border:1.5px solid currentColor;margin-bottom:18px;
}
.tg{color:var(--g0);background:var(--g-pale)}
.tc{color:var(--coral);background:rgba(255,64,96,.07)}

.sh2{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(2.4rem,3.8vw,3.8rem);
  line-height:.97;letter-spacing:-.05em;color:var(--ink);
}
.sh2 em{
  font-style:italic;
  background:linear-gradient(135deg,var(--g0),#22D472);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── BLOG INDEX ── */
.blog-index{
  padding:140px 60px 100px;
  max-width:1260px;margin:0 auto;
}
.blog-index-hdr{margin-bottom:52px}

.blog-list{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}

.bc{
  border-radius:24px;overflow:hidden;
  background:var(--card);border:1.5px solid var(--border);
  box-shadow:0 4px 20px var(--shadow);
  transition:transform .28s,box-shadow .28s;
  position:relative;text-decoration:none;color:inherit;display:block;
}
.bc:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 50px var(--shadow-lg);
}
.bc-art{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;height:190px}
.bc-art::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(255,255,255,.25));
}
.bc-body{padding:26px}
.bc-tag{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.bc-tag.tg-g{color:var(--g0)}.bc-tag.tg-lv{color:var(--lav)}.bc-tag.tg-co{color:var(--coral)}.bc-tag.tg-sk{color:var(--sky)}.bc-tag.tg-su{color:var(--sun)}
.bc-title{
  font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;
  color:var(--ink);line-height:1.32;margin-bottom:10px;letter-spacing:-.02em;
}
.bc-exc{font-size:.84rem;line-height:1.7;color:var(--ink2);margin-bottom:16px}
.bc-meta{display:flex;gap:14px;font-size:.73rem;color:var(--ink3)}

/* ── FOOTER ── */
footer{
  background:linear-gradient(135deg,#1A3828,#0F2018);
  padding:52px 60px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px;
}
.fl{
  font-family:'Kaushan Script',cursive;font-size:2.1rem;font-weight:400;
  letter-spacing:-.02em;
  background:linear-gradient(90deg,#2CBCB3,#7EEAB0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.fl-sub{font-size:.78rem;color:rgba(255,255,255,.28);margin-top:4px}
.fr{text-align:right;font-size:.76rem;color:rgba(255,255,255,.22)}
.fr a{color:var(--g-light);text-decoration:none}

/* ── RESPONSIVE ── */
@media(max-width:1060px){
  nav{padding:0 24px}
  .blog-index{padding:120px 32px 80px}
  .blog-list{grid-template-columns:1fr 1fr}
  footer{padding:40px 28px}
}
@media(max-width:640px){
  .blog-list{grid-template-columns:1fr}
  .nav-links .npill:not(.solid){display:none}
}
</style>
</head>
